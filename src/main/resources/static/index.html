<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Solver</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Sudoku Solver</h1>

  <div id="grid"></div>

  <div class="buttons">
    <button onclick="solve()">Solve</button>
    <button onclick="clearBoard()">Clear</button>
  </div>

  <p id="message"></p>

  <script>
    const gridEl = document.getElementById("grid");
    const messageEl = document.getElementById("message");
    const size = 9;

    function createGrid() {
      for (let r = 0; r < size; r++) {
        const row = document.createElement("div");
        row.className = "row";
        for (let c = 0; c < size; c++) {
          const cell = document.createElement("input");
          cell.type = "number";
          cell.min = "1";
          cell.max = "9";
          cell.className = "cell";
          cell.id = `cell-${r}-${c}`;
          row.appendChild(cell);
        }
        gridEl.appendChild(row);
      }
    }

    function getBoard() {
      const board = [];
      for (let r = 0; r < size; r++) {
        const row = [];
        for (let c = 0; c < size; c++) {
          const val = document.getElementById(`cell-${r}-${c}`).value;
          row.push(val ? parseInt(val) : 0);
        }
        board.push(row);
      }
      return board;
    }

    function setBoard(board) {
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const el = document.getElementById(`cell-${r}-${c}`);
          el.value = board[r][c] === 0 ? "" : board[r][c];
        }
      }
    }

    async function solve() {
      messageEl.textContent = "Solving...";
      const board = getBoard();

      const resp = await fetch("/api/solve", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ board }),
      });
      const data = await resp.json();

      if (data.board) {
        setBoard(data.board);
        messageEl.textContent = "Solved ✅";
      } else {
        messageEl.textContent = data.message || "No solution found ❌";
      }
    }

    function clearBoard() {
      const cells = document.querySelectorAll(".cell");
      cells.forEach((c) => (c.value = ""));
      messageEl.textContent = "";
    }

    createGrid();
  </script>
</body>
</html>
